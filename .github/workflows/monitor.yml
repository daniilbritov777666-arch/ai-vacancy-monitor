name: Telegram Vacancy Monitor

on:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: telegram-vacancy-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run monitor loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNELS: ${{ vars.TELEGRAM_CHANNELS }}
          RSS_FEEDS: ${{ vars.RSS_FEEDS }}
          SEND_FIRST_RUN: ${{ vars.SEND_FIRST_RUN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for i in $(seq 1 66); do
            echo "Monitor iteration $i/66"
            git pull --ff-only || true
            PYTHONPATH=src python -m vacancy_monitor.cli || true
            git add data/seen_posts.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: update seen vacancy posts"
              git push
            fi
            if [ "$i" -lt 66 ]; then
              sleep 300
            fi
          done

      - name: Restart monitor loop
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          curl -fsS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/monitor.yml/dispatches \
            -d '{"ref":"main"}'
